<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Quiz Game 🎮 — TinyLearn</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../public/shared.css"/>
<style>
.hero-game{background:linear-gradient(135deg,#A29BFE,#6741d9)}
.game-wrap{max-width:640px;margin:0 auto}
.score-row{display:flex;gap:16px;justify-content:center;margin-bottom:28px;flex-wrap:wrap}
.badge{background:#fff;border-radius:50px;padding:10px 24px;font-family:'Fredoka One',cursive;font-size:18px;box-shadow:0 4px 16px rgba(0,0,0,0.1);display:flex;align-items:center;gap:8px}
.badge .val{font-size:24px;color:#A29BFE}
.badge.streak .val{color:#FF9F43}
.badge.best .val{color:#6BCB77}

.question-card{background:#fff;border-radius:32px;padding:40px 28px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,0.1);margin-bottom:24px;position:relative;overflow:hidden}
.q-category{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:#bbb;margin-bottom:8px}
.q-emoji{font-size:80px;line-height:1;margin-bottom:16px;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.q-text{font-family:'Fredoka One',cursive;font-size:clamp(20px,4vw,28px);color:#333;margin-bottom:8px}
.q-hint{font-size:13px;color:#bbb;font-weight:700}

.choices{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.choice-btn{border:none;border-radius:20px;padding:18px 12px;font-family:'Fredoka One',cursive;font-size:clamp(16px,3vw,22px);cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;box-shadow:0 5px 0 rgba(0,0,0,0.12);color:#fff;position:relative}
.choice-btn:hover:not(:disabled){transform:translateY(-3px);box-shadow:0 8px 0 rgba(0,0,0,0.12)}
.choice-btn:active:not(:disabled){transform:translateY(2px);box-shadow:0 3px 0 rgba(0,0,0,0.12)}
.choice-btn:disabled{cursor:not-allowed}
.choice-btn.correct{animation:wiggle 0.5s;background:#6BCB77!important;box-shadow:0 5px 0 #3a9e4f!important}
.choice-btn.wrong{animation:shake 0.4s;background:#FF6B6B!important;box-shadow:0 5px 0 #c94040!important}
@keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-5deg) scale(1.05)}75%{transform:rotate(5deg) scale(1.05)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-10px)}75%{transform:translateX(10px)}}

.feedback{font-family:'Fredoka One',cursive;font-size:28px;text-align:center;min-height:44px;margin-bottom:12px;transition:all 0.3s}
.next-btn{display:block;width:100%;border:none;border-radius:20px;padding:18px;font-family:'Fredoka One',cursive;font-size:22px;cursor:pointer;background:#A29BFE;color:#fff;box-shadow:0 5px 0 rgba(0,0,0,0.12);transition:transform 0.15s;margin-bottom:16px}
.next-btn:hover{transform:translateY(-2px)}

.progress-bar{background:#f0f0f0;border-radius:50px;height:12px;margin-bottom:24px;overflow:hidden}
.progress-fill{height:100%;border-radius:50px;background:linear-gradient(90deg,#A29BFE,#4D96FF);transition:width 0.4s}

.result-screen{display:none;background:#fff;border-radius:32px;padding:48px 28px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,0.1)}
.result-screen.show{display:block}
.result-emoji{font-size:80px;animation:bounce 0.7s ease infinite alternate}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-16px)}}
.result-title{font-family:'Fredoka One',cursive;font-size:40px;margin-top:12px}
.result-score{font-family:'Fredoka One',cursive;font-size:24px;color:#888;margin-top:8px}
.result-msg{font-size:16px;color:#aaa;font-weight:700;margin-top:8px}
.restart-btn{margin-top:28px;border:none;border-radius:50px;padding:16px 40px;font-family:'Fredoka One',cursive;font-size:22px;cursor:pointer;background:#A29BFE;color:#fff;box-shadow:0 5px 0 rgba(0,0,0,0.15);transition:transform 0.15s}
.restart-btn:hover{transform:translateY(-2px)}
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="../index.html" class="nav-logo">🌈 TinyLearn</a>
    <div class="nav-links">
      <a href="abc.html" class="nav-link abc">🔤 ABCs</a>
      <a href="colors.html" class="nav-link colors">🎨 Colors</a>
      <a href="animals.html" class="nav-link animals">🐾 Animals</a>
      <a href="numbers.html" class="nav-link numbers">🔢 Numbers</a>
      <a href="game.html" class="nav-link game active">🎮 Game</a>
    </div>
  </div>
</nav>

<div class="page-hero hero-game">
  <div class="page-hero-title">Quiz Time! 🎮</div>
  <div class="page-hero-sub">Answer 10 questions and show what you know! ⭐</div>
</div>

<div class="content">
  <div class="game-wrap">
    <div class="score-row">
      <div class="badge">⭐ Score <span class="val" id="score">0</span></div>
      <div class="badge streak">🔥 Streak <span class="val" id="streak">0</span></div>
      <div class="badge best">🏆 Best <span class="val" id="best">0</span></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>

    <div class="question-card" id="question-card">
      <div class="q-category" id="q-cat"></div>
      <div class="q-emoji" id="q-emoji"></div>
      <div class="q-text" id="q-text"></div>
      <div class="q-hint" id="q-hint"></div>
    </div>
    <div class="choices" id="choices"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="next-btn" style="display:none" onclick="nextQ()">Next Question ➡️</button>

    <div class="result-screen" id="result-screen">
      <div class="result-emoji" id="r-emoji"></div>
      <div class="result-title" id="r-title"></div>
      <div class="result-score" id="r-score"></div>
      <div class="result-msg" id="r-msg"></div>
      <button class="restart-btn" onclick="startGame()">Play Again! 🔄</button>
    </div>
  </div>
</div>

<footer>Made with <span>♥</span> for little learners 🌍</footer>

<script>
const allQuestions=[
  // Colors
  {cat:'🎨 Colors',e:'🍎',q:'What color is an apple?',a:'Red',ch:['Red','Blue','Green','Yellow']},
  {cat:'🎨 Colors',e:'☀️',q:'What color is the sun?',a:'Yellow',ch:['Purple','Yellow','Pink','Orange']},
  {cat:'🎨 Colors',e:'🌊',q:'What color is the ocean?',a:'Blue',ch:['Red','Green','Blue','Brown']},
  {cat:'🎨 Colors',e:'🌿',q:'What color is grass?',a:'Green',ch:['Yellow','Blue','Orange','Green']},
  {cat:'🎨 Colors',e:'🍊',q:'What color is an orange?',a:'Orange',ch:['Orange','Pink','Purple','Red']},
  {cat:'🎨 Colors',e:'🍇',q:'What color are grapes?',a:'Purple',ch:['Purple','Pink','Blue','Black']},
  {cat:'🎨 Colors',e:'🌸',q:'What color are flowers?',a:'Pink',ch:['Pink','Orange','Brown','White']},
  {cat:'🎨 Colors',e:'🐻',q:'What color is a bear?',a:'Brown',ch:['Black','White','Brown','Yellow']},
  // Animals
  {cat:'🐾 Animals',e:'🐱',q:'What sound does a cat make?',a:'Meow!',ch:['Woof!','Quack!','Meow!','Moo!']},
  {cat:'🐾 Animals',e:'🐶',q:'What sound does a dog make?',a:'Woof!',ch:['Meow!','Woof!','Oink!','Roar!']},
  {cat:'🐾 Animals',e:'🐄',q:'What sound does a cow make?',a:'Moo!',ch:['Baa!','Moo!','Cluck!','Hiss!']},
  {cat:'🐾 Animals',e:'🐸',q:'What sound does a frog make?',a:'Ribbit!',ch:['Quack!','Ribbit!','Woof!','Meow!']},
  {cat:'🐾 Animals',e:'🦁',q:'What is the biggest wild cat?',a:'Lion',ch:['Tiger','Lion','Leopard','Cheetah']},
  {cat:'🐾 Animals',e:'🐘',q:'Which animal has a long trunk?',a:'Elephant',ch:['Giraffe','Elephant','Hippo','Rhino']},
  {cat:'🐾 Animals',e:'🦒',q:'Which animal has the longest neck?',a:'Giraffe',ch:['Horse','Camel','Giraffe','Ostrich']},
  // Numbers
  {cat:'🔢 Numbers',e:'3️⃣',q:'What number is this?',a:'Three',ch:['One','Four','Three','Two']},
  {cat:'🔢 Numbers',e:'7️⃣',q:'What number is this?',a:'Seven',ch:['Six','Nine','Seven','Eight']},
  {cat:'🔢 Numbers',e:'🍎🍎🍎🍎🍎',q:'How many apples are there?',a:'Five',ch:['Three','Four','Six','Five']},
  {cat:'🔢 Numbers',e:'⭐⭐⭐',q:'How many stars are there?',a:'Three',ch:['Two','Three','Four','Five']},
  // Shapes
  {cat:'🔷 Shapes',e:'⭐',q:'What shape is a star?',a:'Star',ch:['Circle','Square','Star','Triangle']},
  {cat:'🔷 Shapes',e:'⚽',q:'What shape is a ball?',a:'Circle',ch:['Triangle','Circle','Square','Heart']},
  {cat:'🔷 Shapes',e:'📦',q:'What shape is a box?',a:'Square',ch:['Circle','Triangle','Square','Oval']},
  // ABC
  {cat:'🔤 Alphabet',e:'🍎',q:'Apple starts with which letter?',a:'A',ch:['A','B','C','D']},
  {cat:'🔤 Alphabet',e:'🐶',q:'Dog starts with which letter?',a:'D',ch:['B','C','D','E']},
  {cat:'🔤 Alphabet',e:'🌈',q:'Rainbow starts with which letter?',a:'R',ch:['P','Q','R','S']},
];

const TOTAL=10;
let questions=[],currentIdx=0,score=0,streak=0,best=0,answered=false;
const btnColors=['#FF6B6B','#FFD93D','#6BCB77','#4D96FF'];

function shuffle(arr){return [...arr].sort(()=>Math.random()-0.5);}
function startGame(){
  questions=shuffle(allQuestions).slice(0,TOTAL);
  currentIdx=0;score=0;streak=0;answered=false;
  updateBadges();
  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('question-card').style.display='block';
  document.getElementById('choices').style.display='grid';
  loadQ();
}
function loadQ(){
  answered=false;
  const q=questions[currentIdx];
  document.getElementById('q-cat').textContent=q.cat;
  document.getElementById('q-emoji').textContent=q.e;
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('q-hint').textContent='';
  document.getElementById('feedback').textContent='';
  document.getElementById('next-btn').style.display='none';
  document.getElementById('progress').style.width=((currentIdx/TOTAL)*100)+'%';

  const ch=document.getElementById('choices');
  ch.innerHTML='';
  shuffle(q.ch).forEach((c,i)=>{
    const btn=document.createElement('button');
    btn.className='choice-btn';
    btn.style.background=btnColors[i];
    btn.style.boxShadow=`0 5px 0 ${darken(btnColors[i])}`;
    btn.textContent=c;
    btn.onclick=()=>checkAnswer(c,q.a,q);
    ch.appendChild(btn);
  });
  speak(q.q);
}
function checkAnswer(chosen,correct,q){
  if(answered)return;
  answered=true;
  const btns=document.querySelectorAll('.choice-btn');
  btns.forEach(b=>{
    b.disabled=true;
    if(b.textContent===correct)b.classList.add('correct');
    else if(b.textContent===chosen&&chosen!==correct)b.classList.add('wrong');
  });
  const fb=document.getElementById('feedback');
  if(chosen===correct){
    score++;streak++;if(streak>best)best=streak;
    const msgs=['🎉 Amazing!','⭐ Super!','🌟 Brilliant!','🎈 Correct!','🏆 Fantastic!'];
    fb.textContent=msgs[Math.floor(Math.random()*msgs.length)];
    fb.style.color='#2f9e44';
    speak('Correct! '+msgs[Math.floor(Math.random()*msgs.length)]);
  } else {
    streak=0;
    fb.textContent='❌ The answer was '+correct+'!';
    fb.style.color='#e03131';
    speak('Not quite! The answer was '+correct);
  }
  updateBadges();
  document.getElementById('next-btn').style.display='block';
}
function nextQ(){
  currentIdx++;
  if(currentIdx>=TOTAL){showResult();}else{loadQ();}
}
function showResult(){
  document.getElementById('question-card').style.display='none';
  document.getElementById('choices').style.display='none';
  document.getElementById('feedback').textContent='';
  document.getElementById('next-btn').style.display='none';
  document.getElementById('progress').style.width='100%';

  const pct=score/TOTAL;
  let emoji,title,msg;
  if(pct>=0.9){emoji='🏆';title='Perfect!';msg='You are a superstar! 🌟'}
  else if(pct>=0.7){emoji='🎉';title='Amazing!';msg='You did so well! Keep going!'}
  else if(pct>=0.5){emoji='😊';title='Good job!';msg='Practice makes perfect!'}
  else{emoji='💪';title='Keep trying!';msg='Every try makes you smarter!'}

  document.getElementById('r-emoji').textContent=emoji;
  document.getElementById('r-title').style.color=pct>=0.7?'#2f9e44':pct>=0.5?'#e6a200':'#4D96FF';
  document.getElementById('r-title').textContent=title;
  document.getElementById('r-score').textContent=`You got ${score} out of ${TOTAL} right!`;
  document.getElementById('r-msg').textContent=msg;
  document.getElementById('result-screen').classList.add('show');
  speak(title+'. You got '+score+' out of '+TOTAL+' right. '+msg);
}
function updateBadges(){
  document.getElementById('score').textContent=score;
  document.getElementById('streak').textContent=streak;
  document.getElementById('best').textContent=best;
}
function darken(hex){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgb(${Math.max(0,r-40)},${Math.max(0,g-40)},${Math.max(0,b-40)})`;
}
function speak(t){if('speechSynthesis' in window){window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.rate=0.82;u.pitch=1.15;window.speechSynthesis.speak(u);}}
startGame();
</script>
</body>
</html>
