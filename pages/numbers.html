<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Numbers 🔢 — TinyLearn</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔢</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../public/shared.css"/>
<style>
.hero-numbers{background:linear-gradient(135deg,#4D96FF,#A29BFE)}
.numbers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px;margin-bottom:60px}
.num-card{border-radius:24px;padding:24px 16px;text-align:center;cursor:pointer;box-shadow:0 5px 0 rgba(0,0,0,0.12);transition:transform 0.15s,box-shadow 0.15s;position:relative;overflow:hidden}
.num-card:hover{transform:translateY(-5px) scale(1.04);box-shadow:0 10px 0 rgba(0,0,0,0.12)}
.num-card:active{transform:translateY(1px)}
.num-digit{font-family:'Fredoka One',cursive;font-size:56px;line-height:1;color:#fff;text-shadow:3px 3px 0 rgba(0,0,0,0.12)}
.num-word{font-family:'Fredoka One',cursive;font-size:20px;color:rgba(255,255,255,0.9);margin-top:4px}
.num-dots{font-size:22px;margin-top:8px;line-height:1.4;min-height:28px;letter-spacing:2px}

.counting-section{background:#fff;border-radius:28px;padding:40px 28px;box-shadow:0 6px 30px rgba(0,0,0,0.08);margin-bottom:48px;text-align:center}
.counting-title{font-family:'Fredoka One',cursive;font-size:28px;color:#444;margin-bottom:20px}
.count-display{font-family:'Fredoka One',cursive;font-size:80px;color:#4D96FF;line-height:1;min-height:90px}
.count-word{font-family:'Fredoka One',cursive;font-size:28px;color:#888;margin-top:4px}
.count-objects{font-size:28px;margin:16px 0;min-height:40px;letter-spacing:6px;word-break:break-all}
.count-btns{display:flex;gap:16px;justify-content:center;margin-top:20px}
.count-btn{border:none;border-radius:50px;width:64px;height:64px;font-size:30px;cursor:pointer;font-family:'Fredoka One',cursive;transition:transform 0.15s;box-shadow:0 4px 0 rgba(0,0,0,0.15)}
.count-btn.minus{background:#FF6B6B;color:#fff}
.count-btn.plus{background:#6BCB77;color:#fff}
.count-btn:hover{transform:scale(1.1)}
.count-btn:active{transform:scale(0.95)}
.count-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="../index.html" class="nav-logo">🌈 TinyLearn</a>
    <div class="nav-links">
      <a href="abc.html" class="nav-link abc">🔤 ABCs</a>
      <a href="colors.html" class="nav-link colors">🎨 Colors</a>
      <a href="animals.html" class="nav-link animals">🐾 Animals</a>
      <a href="numbers.html" class="nav-link numbers active">🔢 Numbers</a>
      <a href="game.html" class="nav-link game">🎮 Game</a>
    </div>
  </div>
</nav>

<div class="page-hero hero-numbers">
  <div class="page-hero-title">Numbers! 🔢</div>
  <div class="page-hero-sub">Count from 1 to 20! Tap a number to hear it! 🎵</div>
</div>

<div class="content">
  <div class="counting-section">
    <div class="counting-title">🎯 Let's Count Together!</div>
    <div class="count-display" id="count-display">1</div>
    <div class="count-word" id="count-word">One</div>
    <div class="count-objects" id="count-objects">⭐</div>
    <div class="count-btns">
      <button class="count-btn minus" id="btn-minus" onclick="changeCount(-1)" disabled>−</button>
      <button class="count-btn plus" onclick="changeCount(1)">+</button>
    </div>
  </div>

  <div class="numbers-grid" id="numbers-grid"></div>
</div>

<footer>Made with <span>♥</span> for little learners 🌍</footer>

<script>
const words=['One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen','Twenty'];
const emojis=['⭐','🌙','🌈','🦋','🍎','🎈','🎵','🌸','🐶','❤️','🌟','🎉','🦄','🍦','🌺','🎨','🐝','🌊','🎯','🏆'];
const colors=['#FF6B6B','#FF9F43','#FFD93D','#6BCB77','#4D96FF','#A29BFE','#fd79a8','#74B9FF','#00cec9','#e17055','#6BCB77','#FF6B6B','#A29BFE','#FFD93D','#4D96FF','#FF9F43','#fd79a8','#6BCB77','#FF6B6B','#FFD93D'];

let count=1;
function updateCountDisplay(){
  document.getElementById('count-display').textContent=count;
  document.getElementById('count-word').textContent=words[count-1];
  document.getElementById('count-objects').textContent=emojis[count-1].repeat(count);
  document.getElementById('btn-minus').disabled=count<=1;
  speak(words[count-1]);
}
function changeCount(d){count=Math.max(1,Math.min(20,count+d));updateCountDisplay();}

const grid=document.getElementById('numbers-grid');
for(let i=1;i<=20;i++){
  const el=document.createElement('div');
  el.className='num-card';
  el.style.background=colors[i-1];
  const dots=emojis[i-1].repeat(Math.min(i,10));
  el.innerHTML=`<div class="num-digit">${i}</div><div class="num-word">${words[i-1]}</div><div class="num-dots">${dots}</div>`;
  el.onclick=()=>{
    el.style.transform='scale(1.15) rotate(-3deg)';
    setTimeout(()=>el.style.transform='',400);
    speak(i+'. '+words[i-1]);
    count=i;
    updateCountDisplay();
    window.scrollTo({top:0,behavior:'smooth'});
  };
  grid.appendChild(el);
}

function speak(t){if('speechSynthesis' in window){window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.rate=0.8;u.pitch=1.2;window.speechSynthesis.speak(u);}}
</script>
</body>
</html>
